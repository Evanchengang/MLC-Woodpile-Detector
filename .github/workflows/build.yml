name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows-64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python-headless pillow
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      
      - name: Build EXE (64-bit)
        run: |
          pyinstaller --windowed --name "MLC_Woodpile_Detector_x64" `
            --add-data "assets/best.pt;assets" `
            --add-data "assets/Logo.png;assets" `
            --add-data "assets/help.html;assets" `
            --add-data "pydoc.py;." `
            --hidden-import pydoc `
            --hidden-import ultralytics `
            --hidden-import cv2 `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import torch `
            --collect-all ultralytics `
            --noconfirm `
            main.py
      
      - name: Upload artifact (64-bit)
        uses: actions/upload-artifact@v4
        with:
          name: MLC_Woodpile_Detector_Windows_x64
          path: dist/MLC_Woodpile_Detector_x64/

  build-windows-32:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python (32-bit)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x86'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller ultralytics opencv-python-headless pillow
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
      
      - name: Build EXE (32-bit)
        run: |
          pyinstaller --windowed --name "MLC_Woodpile_Detector_x86" `
            --add-data "assets/best.pt;assets" `
            --add-data "assets/Logo.png;assets" `
            --add-data "assets/help.html;assets" `
            --add-data "pydoc.py;." `
            --hidden-import pydoc `
            --hidden-import ultralytics `
            --hidden-import cv2 `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageTk `
            --hidden-import torch `
            --collect-all ultralytics `
            --noconfirm `
            main.py
      
      - name: Upload artifact (32-bit)
        uses: actions/upload-artifact@v4
        with:
          name: MLC_Woodpile_Detector_Windows_x86
          path: dist/MLC_Woodpile_Detector_x86/
